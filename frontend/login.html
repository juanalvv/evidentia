<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — Evidentia</title>
  <link rel="stylesheet" href="css/site.css" />
</head>
<body class="site auth-page" data-page="login">
  <nav class="nav-float-wrap" aria-label="Main">
    <div class="nav-float">
      <a href="index.html" class="nav-brand">
        <span class="nav-dot" aria-hidden="true"></span>
        Evidentia
      </a>
      <div class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
      </div>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-ghost">Register</a>
        <a href="app.html" class="btn btn-primary">Get started</a>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-sub">Log in to run analyses on your drafts. (Coming soon)</p>
      <form class="auth-form" action="#" method="post" onsubmit="return false;">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@university.edu" autocomplete="email" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" />
        </label>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>
      <p class="auth-switch">
        Don’t have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </main>

  <script src="js/nav.js"></script>
</body>
</html>
